events {
    worker_connections 1024;
}

http {
    # Allow larger uploads (e.g., high-DPI images during annotation).
    # Default is 1m, which can trigger 413 "Request Entity Too Large".
    # Batch annotate often uploads ~10 images at once (each ~10–15MB), so keep headroom.
    client_max_body_size 250m;

    upstream gui {
        server gui:3000;
    }

    upstream api {
        server api:8001;
    }

    upstream genotype {
        server genotype:8002;
    }

    server {
        listen 80;
        server_name localhost;

        # Handle GUI requests (root path)
        location / {
            proxy_pass http://gui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # The GUI has an `/api` page, but `/api/*` is reserved for backend routes.
        #
        # Important: nginx will auto-redirect `/api` -> `/api/` if a `location /api/` exists.
        # Next.js (default) tends to redirect `/api/` -> `/api`, causing a redirect loop.
        # Fix by handling both exact paths explicitly.
        location = /api {
            proxy_pass http://gui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location = /api/ {
            return 308 /api;
        }

        # Next.js API route used by the GUI (must bypass the FastAPI /api/ proxy).
        location ^~ /api/vision-chat {
            proxy_pass http://gui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Handle API requests (/api/*)
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;

            # Batch analysis can take a while (multiple large images + model inference),
            # so increase timeouts to avoid 504s.
            proxy_connect_timeout 60s;
            proxy_send_timeout 1d;
            proxy_read_timeout 1d;
            send_timeout 1d;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Handle genotype API requests (/genotype-api/*)
        # Note: the GUI has a `/genotype` page, so we avoid proxying that path.
        location /genotype-api/ {
            proxy_pass http://genotype/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /genotype-api;

            # GWAS/MLM/FarmCPU requests can be long-running on larger marker sets.
            proxy_connect_timeout 60s;
            proxy_send_timeout 1d;
            proxy_read_timeout 1d;
            send_timeout 1d;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}
